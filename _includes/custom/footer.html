<footer class="d-flex w-100 justify-content-center">
  <div class="d-flex justify-content-between align-items-center">
    <div class="footer-left">
      <p class="mb-0">
        © {{ 'now' | date: '%Y' }} 
        <a href="{{ site.social.links[0] | default: '/' }}">{{ site.author.name | default: 'Author' }}</a>.
      </p>
    </div>
  </div>
</footer>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const license = document.querySelector('.license-wrapper');
    if (license) {
      license.style.setProperty('display', 'none', 'important');
    }

    const shareLinks = document.querySelectorAll('.share-wrapper a');
    shareLinks.forEach(link => {
      link.style.setProperty('display', 'none', 'important');
    });
  });
</script>
